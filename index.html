
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="shortcut icon" href="/img/fav.png" type="image/x-icon">
<title>Job Application Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-6xl mx-auto p-4">

    <!-- Header -->
    <h1 class="text-3xl font-bold text-center mb-6">
        Job Application Tracker
    </h1>

    <!-- Dashboard -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white p-4 rounded shadow text-center">
            <h2 class="text-gray-500">Total</h2>
            <p id="totalCount" class="text-2xl font-bold">0</p>
        </div>
        <div class="bg-white p-4 rounded shadow text-center">
            <h2 class="text-gray-500">Interview</h2>
            <p id="interviewCount" class="text-2xl font-bold text-green-500">0</p>
        </div>
        <div class="bg-white p-4 rounded shadow text-center">
            <h2 class="text-gray-500">Rejected</h2>
            <p id="rejectedCount" class="text-2xl font-bold text-red-500">0</p>
        </div>
    </div>

    <!-- Available Jobs -->
    <div class="bg-white p-4 rounded shadow">

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold">Available Jobs</h2>
            <span id="tabCount" class="text-gray-600">0 Jobs</span>
        </div>

        <!-- Tabs -->
        <div class="flex gap-4 mb-6">
            <button class="tabBtn bg-blue-500 text-white px-4 py-1 rounded"
                data-tab="all">All</button>

            <button class="tabBtn bg-gray-200 px-4 py-1 rounded"
                data-tab="interview">Interview</button>

            <button class="tabBtn bg-gray-200 px-4 py-1 rounded"
                data-tab="rejected">Rejected</button>
        </div>

        <!-- Cards -->
        <div id="jobsContainer" class="grid md:grid-cols-1 gap-4"></div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-10">
         <i class="fa-sharp fa-solid fa-file-lines text-[130px]" style="color: rgb(116, 192, 252);"></i>
            <h3 class="text-lg font-semibold">No jobs available</h3>
            <p class="text-gray-500">
                Check back soon for new opportunities
            </p>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
